model_id: xtuner/llava-phi-3-mini-hf
model_family: llava-phi

LoRA:
  r: 0
  alpha: 128
  dropout: 0.0

loss_type: grad_ascent       # fine for Stage 1, just runs CE
tune_vision_tower: True       # enable so model learns face-fact binding
tune_mm_projector: True
tune_language_model: True

data_path: ./dataset/full.json
split: null

batch_size: 4
gradient_accumulation_steps: 2   # was 16; eff_batch=8 gives ~4250 steps vs 530
max_grad_norm: 1.0
num_epochs: 10
gradient_checkpointing: true

save_dir: models/stage1_llava_phi_lr5e5_accum2
save_steps: 1000

lr: 5e-5                        # was 1e-5; higher LR for smaller eff batch
weight_decay: 0.01
seed: 0
workers: 4
lr_scheduler_type: "cosine"
warmup_ratio: 0.10
max_train_steps: -1
report_to: "wandb"
resume_from_checkpoint: ""