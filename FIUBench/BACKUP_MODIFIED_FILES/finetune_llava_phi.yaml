model_id: xtuner/llava-phi-3-mini-hf
model_family: llava-phi

LoRA:
  r: 0
  alpha: 128
  dropout: 0.05

loss_type: nll
tune_vision_tower: True
tune_mm_projector: True
tune_language_model: True
data_path: ./dataset/full.json
split: full
batch_size: 8
gradient_accumulation_steps: 16
max_grad_norm: 10.0
num_epochs: 10
save_dir: models/final_ft_${num_epochs}_epochs_lr${lr}_${model_family}_${split}
save_steps: 210
lr: 2e-5
weight_decay: 0.0
seed: 0
workers: 4
lr_scheduler_type: "cosine"
warmup_ratio: 0.1
max_train_steps: -1
max_length: 512
report_to: "wandb"
resume_from_checkpoint: ""

# Discriminative learning rates for vision adaptation
use_discriminative_lr: True
vision_lr: 1e-4
mm_projector_lr: 5e-5
language_model_lr: 1e-5
